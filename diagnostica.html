<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagnostica upload PDF</title>
<style>
  body{font-family:-apple-system,"Helvetica Neue",Arial,sans-serif;background:#F2F2F7;margin:0;padding:24px 16px;color:#1C1C1E;}
  .card{max-width:560px;margin:0 auto;background:#fff;border-radius:14px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.08);}
  h1{font-size:17px;margin:0 0 4px;}
  p.sub{font-size:13px;color:#8E8E93;margin:0 0 18px;}
  button{width:100%;height:48px;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;background:#1C1C1E;color:#fff;margin-bottom:14px;}
  pre{background:#111;color:#0f0;font-size:12px;padding:12px;border-radius:10px;white-space:pre-wrap;word-break:break-word;max-height:70vh;overflow:auto;}
  .lbl{font-size:12px;font-weight:700;color:#8E8E93;text-transform:uppercase;margin:14px 0 4px;}
</style>
</head>
<body>
<div class="card">
  <h1>Diagnostica upload PDF su Supabase</h1>
  <p class="sub">Prova un upload reale su un percorso di test e mostra la risposta esatta del server (senza toccare le tue schede).</p>
  <button id="btn-test">Esegui test</button>
  <div id="out"></div>
</div>

<script>
var SB_URL = 'https://bikfwlnzczbvgzsanfwc.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJpa2Z3bG56Y3pidmd6c2FuZndjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxNzI5NzgsImV4cCI6MjA5ODc0ODk3OH0.gUiR3uEwbBHN1t_z-ec8d_uDBpiJgLRprf3x3rtd1ok';

function sectionOut(title, text){
  var out = document.getElementById('out');
  var lbl = document.createElement('div');
  lbl.className = 'lbl';
  lbl.textContent = title;
  var pre = document.createElement('pre');
  pre.textContent = text;
  out.appendChild(lbl);
  out.appendChild(pre);
}

document.getElementById('btn-test').addEventListener('click', async function(){
  document.getElementById('out').innerHTML = '';
  var testPath = '_diagnostica/test_' + Date.now() + '.pdf';
  var dummyPdf = new Blob(['%PDF-1.4 test diagnostico'], {type: 'application/pdf'});

  try{
    var res1 = await fetch(SB_URL + '/storage/v1/object/foto-pazienti/' + testPath, {
      method: 'POST',
      headers: {
        'apikey': SB_KEY,
        'Authorization': 'Bearer ' + SB_KEY,
        'Content-Type': 'application/pdf',
        'x-upsert': 'true'
      },
      body: dummyPdf
    });
    var text1 = await res1.text();
    sectionOut('POST status ' + res1.status + ' ' + res1.statusText, text1);

    if(!res1.ok){
      var res2 = await fetch(SB_URL + '/storage/v1/object/foto-pazienti/' + testPath, {
        method: 'PUT',
        headers: {
          'apikey': SB_KEY,
          'Authorization': 'Bearer ' + SB_KEY,
          'Content-Type': 'application/pdf'
        },
        body: dummyPdf
      });
      var text2 = await res2.text();
      sectionOut('PUT status ' + res2.status + ' ' + res2.statusText, text2);
    }

    // Prova anche a listare il bucket per vedere se abbiamo permesso di lettura
    var resList = await fetch(SB_URL + '/storage/v1/object/list/foto-pazienti', {
      method: 'POST',
      headers: {
        'apikey': SB_KEY,
        'Authorization': 'Bearer ' + SB_KEY,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ prefix: '', limit: 5 })
    });
    var textList = await resList.text();
    sectionOut('LIST status ' + resList.status, textList);

    // Info sul bucket stesso (limiti di dimensione, mime consentiti)
    var resBucket = await fetch(SB_URL + '/storage/v1/bucket/foto-pazienti', {
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
    });
    var textBucket = await resBucket.text();
    sectionOut('BUCKET INFO status ' + resBucket.status, textBucket);

  }catch(e){
    sectionOut('ERRORE JS', e.message);
  }
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagnostica documenti-studio</title>
<style>
  body{font-family:-apple-system,"Helvetica Neue",Arial,sans-serif;background:#F2F2F7;margin:0;padding:24px 16px;color:#1C1C1E;}
  .card{max-width:560px;margin:0 auto;background:#fff;border-radius:14px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.08);}
  h1{font-size:17px;margin:0 0 4px;}
  button{width:100%;height:48px;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;background:#1C1C1E;color:#fff;margin-bottom:14px;}
  pre{background:#111;color:#0f0;font-size:12px;padding:12px;border-radius:10px;white-space:pre-wrap;word-break:break-word;}
  .lbl{font-size:12px;font-weight:700;color:#8E8E93;text-transform:uppercase;margin:14px 0 4px;}
</style>
</head>
<body>
<div class="card">
  <h1>Diagnostica bucket documenti-studio</h1>
  <button id="btn-test">Esegui test</button>
  <div id="out"></div>
</div>
<script>
var SB_URL = 'https://bikfwlnzczbvgzsanfwc.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJpa2Z3bG56Y3pidmd6c2FuZndjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxNzI5NzgsImV4cCI6MjA5ODc0ODk3OH0.gUiR3uEwbBHN1t_z-ec8d_uDBpiJgLRprf3x3rtd1ok';
function out(t,x){var o=document.getElementById('out');var l=document.createElement('div');l.className='lbl';l.textContent=t;var p=document.createElement('pre');p.textContent=x;o.appendChild(l);o.appendChild(p);}
document.getElementById('btn-test').addEventListener('click', async function(){
  document.getElementById('out').innerHTML='';
  var path='_diagnostica/test_'+Date.now()+'.pdf';
  try{
    var res=await fetch(SB_URL+'/storage/v1/object/documenti-studio/'+path,{method:'POST',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/pdf','x-upsert':'true'},body:new Blob(['%PDF-1.4 test'],{type:'application/pdf'})});
    var t=await res.text();
    out('UPLOAD status '+res.status, t);
    if(res.ok){
      await fetch(SB_URL+'/storage/v1/object/documenti-studio',{method:'DELETE',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'},body:JSON.stringify({prefixes:[path]})});
      out('PULIZIA','fatto');
    }
  }catch(e){ out('ERRORE JS', e.message); }
});
</script>
</body>
</html>

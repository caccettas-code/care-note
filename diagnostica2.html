<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagnostica salvataggio scheda</title>
<style>
  body{font-family:-apple-system,"Helvetica Neue",Arial,sans-serif;background:#F2F2F7;margin:0;padding:24px 16px;color:#1C1C1E;}
  .card{max-width:560px;margin:0 auto;background:#fff;border-radius:14px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.08);}
  h1{font-size:17px;margin:0 0 4px;}
  p.sub{font-size:13px;color:#8E8E93;margin:0 0 18px;}
  button{width:100%;height:48px;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;background:#1C1C1E;color:#fff;margin-bottom:14px;}
  pre{background:#111;color:#0f0;font-size:12px;padding:12px;border-radius:10px;white-space:pre-wrap;word-break:break-word;max-height:70vh;overflow:auto;}
  .lbl{font-size:12px;font-weight:700;color:#8E8E93;text-transform:uppercase;margin:14px 0 4px;}
</style>
</head>
<body>
<div class="card">
  <h1>Diagnostica salvataggio scheda (tabella "schede")</h1>
  <p class="sub">Prova un inserimento reale di test nella tabella schede e mostra la risposta esatta del server, poi lo elimina subito.</p>
  <button id="btn-test">Esegui test</button>
  <div id="out"></div>
</div>

<script>
var SB_URL = 'https://bikfwlnzczbvgzsanfwc.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJpa2Z3bG56Y3pidmd6c2FuZndjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxNzI5NzgsImV4cCI6MjA5ODc0ODk3OH0.gUiR3uEwbBHN1t_z-ec8d_uDBpiJgLRprf3x3rtd1ok';

function sbHeaders(){
  return { 'Content-Type':'application/json', 'apikey':SB_KEY, 'Authorization':'Bearer '+SB_KEY, 'Prefer':'return=representation' };
}
function sectionOut(title, text){
  var out = document.getElementById('out');
  var lbl = document.createElement('div');
  lbl.className = 'lbl';
  lbl.textContent = title;
  var pre = document.createElement('pre');
  pre.textContent = text;
  out.appendChild(lbl);
  out.appendChild(pre);
}

document.getElementById('btn-test').addEventListener('click', async function(){
  document.getElementById('out').innerHTML = '';

  try{
    var res = await fetch(SB_URL + '/rest/v1/schede', {
      method: 'POST',
      headers: sbHeaders(),
      body: JSON.stringify({
        tipo: 'est',
        cognome: '_diagnostica',
        nome: 'test',
        data_nascita: '',
        dati: { test: true }
      })
    });
    var text = await res.text();
    sectionOut('INSERT status ' + res.status + ' ' + res.statusText, text);

    if(res.ok){
      try{
        var rows = JSON.parse(text);
        if(Array.isArray(rows) && rows[0] && rows[0].id){
          var delRes = await fetch(SB_URL + '/rest/v1/schede?id=eq.' + rows[0].id, {
            method: 'DELETE', headers: sbHeaders()
          });
          sectionOut('Pulizia riga di test: DELETE status ' + delRes.status, 'ok');
        }
      }catch(e){}
    }

    var resSel = await fetch(SB_URL + '/rest/v1/schede?select=id&limit=1', { headers: sbHeaders() });
    var textSel = await resSel.text();
    sectionOut('SELECT status ' + resSel.status, textSel);

  }catch(e){
    sectionOut('ERRORE JS (rete/CORS/fetch fallita)', e.message);
  }
});
</script>
</body>
</html>
